name: Bug report
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug! Please fill this out as clearly as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I click "Approve", the page shows an error instead of confirming...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: role
    attributes:
      label: Which role were you using?
      options:
        - Visitor
        - Host
        - Security Guard
        - Admin
        - Not sure

  - type: textarea
    id: env
    attributes:
      label: Environment
      value: |
        OS:
        Browser:
        Node version:
        Docker version:
