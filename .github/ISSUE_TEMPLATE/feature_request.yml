name: Feature request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Got an idea? We'd love to hear it. Fill in as much as you can.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: As a security guard, I often need to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Have you tried any workarounds?

  - type: dropdown
    id: who
    attributes:
      label: Who would benefit most?
      options:
        - Visitors
        - Hosts / Residents
        - Security Guards
        - Admins
        - Everyone

  - type: checkboxes
    id: contribution
    attributes:
      label: Would you like to build this yourself?
      options:
        - label: Yes, I'd like to submit a PR for this
